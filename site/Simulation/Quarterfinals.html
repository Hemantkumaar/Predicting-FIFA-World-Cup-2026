<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Quarterfinals - FIFA 2026</title>

<style>
body{
margin:0;
font-family:system-ui;
background:linear-gradient(180deg,#070b14,#0b1220);
color:white;
}

.container{
max-width:1200px;
margin:auto;
padding:40px 20px;
}

h1{text-align:center;margin-bottom:30px;}

.match{
background:rgba(18,28,51,.85);
padding:20px;
border-radius:15px;
border:1px solid rgba(255,255,255,.1);
margin-bottom:25px;
}

.teams{
display:flex;
gap:15px;
}

.teamBtn{
flex:1;
padding:12px;
border-radius:10px;
border:1px solid rgba(255,255,255,.2);
background:rgba(255,255,255,.05);
color:white;
font-weight:bold;
cursor:pointer;
}

.teamBtn:disabled{
opacity:.5;
cursor:not-allowed;
}

.predictBtn{
margin-top:15px;
padding:8px 14px;
background:#f6c453;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

.simAllBtn{
margin-bottom:30px;
padding:10px 20px;
background:#28a745;
border:none;
border-radius:10px;
color:white;
font-weight:bold;
cursor:pointer;
}

.backBtn, .nextBtn{
position:fixed;
bottom:30px;
width:60px;
height:60px;
border-radius:50%;
border:none;
background:linear-gradient(135deg,#f6c453,#d4a017);
color:#000;
font-size:26px;
font-weight:bold;
cursor:pointer;
}

.backBtn{ left:30px; }
.nextBtn{ right:30px; }
</style>
</head>

<body>

<!-- persistent soundtrack for tournament flow -->
<audio id="globalSong" src="champion.mp3" preload="auto"></audio>

<!-- Global Audio Player UI -->
<div style="position:fixed;bottom:20px;right:20px;z-index:9999;background:rgba(0,0,0,.95);padding:10px 12px;border-radius:8px;border:2px solid #f6c453;display:flex;align-items:center;gap:8px;font-size:11px;box-shadow:0 4px 20px rgba(0,0,0,.8);font-family:system-ui;">
  <button id="playPauseBtn" style="background:#f6c453;color:#000;border:none;padding:5px 8px;border-radius:4px;cursor:pointer;font-weight:bold;font-size:12px;line-height:1;" onclick="togglePlayPause()">▶</button>
  <span style="color:#a9b4d0;font-size:10px;">🎵 Waka Waka</span>
  <div style="width:80px;height:2px;background:rgba(255,255,255,.2);border-radius:1px;overflow:hidden;"><div id="progressBar" style="height:100%;background:#f6c453;width:0%;"></div></div>
</div>

<div class="container">
<h1>🏆 Quarterfinals</h1>

<button class="simAllBtn" onclick="simulateAll()">Simulate All Matches</button>

<div id="matches"></div>
</div>

<button class="backBtn" onclick="window.location.href='round16.html'">←</button>
<button class="nextBtn" onclick="goNext()">➜</button>

<script>

/* -------- GLOBAL SOUNDTRACK CONTROLS -------- */
// Use localStorage exclusively - survives navigation
const audioState = {
  play() {
    const s = document.getElementById('globalSong');
    if(s) {
      s.play().then(() => {
        this.saveState();
      }).catch(e => console.log('⚠ Play blocked'));
    }
  },
  pause() {
    const s = document.getElementById('globalSong');
    if(s) {
      s.pause();
      this.saveState();
    }
  },
  saveState() {
    const s = document.getElementById('globalSong');
    if(s) {
      localStorage.setItem('__audio_time', String(s.currentTime));
      localStorage.setItem('__audio_playing', !s.paused);
    }
  },
  loadState() {
    const s = document.getElementById('globalSong');
    if(!s) return;
    const t = parseFloat(localStorage.getItem('__audio_time') || 0);
    const p = localStorage.getItem('__audio_playing') === 'true';
    if(t > 0) s.currentTime = t;
    if(p) this.play();
  }
};

function initGlobalSong(){
  const song = document.getElementById('globalSong');
  const btn = document.getElementById('playPauseBtn');
  if(!song) return;
  
  song.volume = 1;
  audioState.loadState();
  
  // Save every 50ms for perfect continuity
  setInterval(() => {
    localStorage.setItem('__audio_time', String(song.currentTime));
    localStorage.setItem('__audio_playing', !song.paused);
    
    const bar = document.getElementById('progressBar');
    if(bar && song.duration) {
      bar.style.width = ((song.currentTime / song.duration) * 100) + '%';
    }
  }, 50);
  
  song.addEventListener('play', () => {
    localStorage.setItem('__audio_playing', 'true');
    if(btn) btn.textContent = '⏸';
  });
  
  song.addEventListener('pause', () => {
    localStorage.setItem('__audio_playing', 'false');
    if(btn) btn.textContent = '▶';
  });
  
  if(btn) {
    btn.textContent = localStorage.getItem('__audio_playing') === 'true' ? '⏸' : '▶';
  }
  
  // Save on page hide
  window.addEventListener('pagehide', () => {
    localStorage.setItem('__audio_time', String(song.currentTime));
    localStorage.setItem('__audio_playing', !song.paused);
    console.log('💾 Saved');
  });
};
  
  setInterval(()=>{
    sessionStorage.setItem('audioTime',song.currentTime);
    localStorage.setItem('songTime',song.currentTime);
    updateProgress();
  },100);
  
  song.addEventListener('play',()=>{
    sessionStorage.setItem('audioPlaying','true');
    localStorage.setItem('songPlaying','true');
    if(btn) btn.textContent='⏸';
  });
  
  song.addEventListener('pause',()=>{
    sessionStorage.setItem('audioPlaying','false');
    localStorage.setItem('songPlaying','false');
    if(btn) btn.textContent='▶';
  });
  
  if(btn) btn.textContent=wasPlaying?'⏸':'▶';
  
  const audioUnlocked=sessionStorage.getItem('audioUnlocked')==='true';
  if(wasPlaying || audioUnlocked){
    song.play().then(()=>{
      console.log('✓ Audio resumed on Quarterfinals');
      if(btn) btn.textContent='⏸';
    }).catch(err=>{
      console.log('⚠ Autoplay blocked, click play button');
      if(btn) btn.textContent='▶';
    });
  }
  
  window.addEventListener('pagehide',()=>{
    sessionStorage.setItem('audioTime',song.currentTime);
    sessionStorage.setItem('audioPlaying','true');
    console.log('💾 Saved on pagehide');
  });
}

function togglePlayPause(){
  const song = document.getElementById('globalSong');
  if(song.paused) audioState.play();
  else audioState.pause();
}

document.addEventListener('DOMContentLoaded',initGlobalSong);/* -------- LOAD QF WINNERS -------- */

// helper to parse JSON stored in localStorage safely
function _safeLoad(key){
  try{ return JSON.parse(localStorage.getItem(key)); }
  catch(_) { return null; }
}

// load or auto‑generate teams for quarterfinals
let teams = _safeLoad("round16_winners");

if(!teams || teams.length !== 8){
  console.warn('round16_winners key missing/invalid in site copy');
  const prev = _safeLoad("round32_winners");
  if(prev && prev.length === 16){
    teams = [];
    for(let i=0;i<16;i+=2){
      const t1 = prev[i], t2 = prev[i+1];
      const prob = t1.perf / (t1.perf + t2.perf);
      teams.push(Math.random() < prob ? t1 : t2);
    }
    localStorage.setItem("round16_winners", JSON.stringify(teams));
    console.log('Auto-generated round16_winners from round32 data (site copy)');
  } else {
    teams = [
      {name:"🇧🇷 Brazil",perf:79.4},
      {name:"🇫🇷 France",perf:76},
      {name:"🇪🇸 Spain",perf:73.8},
      {name:"🇦🇷 Argentina",perf:77.6},
      {name:"🇩🇪 Germany",perf:74},
      {name:"🏴 England",perf:74.7},
      {name:"🇵🇹 Portugal",perf:72.4},
      {name:"🇲🇽 Mexico",perf:72.5}
    ];
    localStorage.setItem("round16_winners", JSON.stringify(teams));
    const container = document.getElementById("matches");
    if(container){
      container.innerHTML = '<p style="color:#f6c453;font-size:18px;">Using default seed teams (no prior data found).</p>';
    }
    console.warn('Injected default teams for quarterfinal display (site copy)');
  }
}

/* -------- VARIABLES -------- */

let qfWinners = new Array(4).fill(null);
let votes={}, locked={};

const container=document.getElementById("matches");

/* -------- GENERATE MATCHES -------- */

for(let i=0;i<8;i+=2){

votes[i]={t1:0,t2:0};
locked[i]=false;

const team1=teams[i];
const team2=teams[i+1];

const div=document.createElement("div");
div.className="match";

div.innerHTML=`
<div class="teams">
<button class="teamBtn" id="t1-${i}" onclick="vote(${i},1)">
${team1.name}
</button>
<button class="teamBtn" id="t2-${i}" onclick="vote(${i},2)">
${team2.name}
</button>
</div>

<button class="predictBtn" onclick="predict(${i})">
Run 10,000 Simulations
</button>
`;

container.appendChild(div);
}

/* -------- VOTING -------- */

function vote(i,team){
if(locked[i]) return;

locked[i]=true;
document.getElementById(`t1-${i}`).disabled=true;
document.getElementById(`t2-${i}`).disabled=true;
}
/* -------- MONTE CARLO -------- */

function predict(i){

const team1=teams[i];
const team2=teams[i+1];

const SIM=10000;
let t1Wins=0, t2Wins=0;

for(let s=0;s<SIM;s++){
const total=team1.perf+team2.perf;
const prob=team1.perf/total;
if(Math.random()<prob) t1Wins++;
else t2Wins++;
}

const winner = t1Wins>t2Wins ? team1 : team2;

/* SAVE PROPERLY */
qfWinners[i/2]=winner;
localStorage.setItem("quarterfinal_winners", JSON.stringify(qfWinners));

alert(`${winner.name} advances to Semifinals!`);
}

/* -------- SIMULATE ALL -------- */

function simulateAll(){
for(let i=0;i<8;i+=2){
predict(i);
}
alert("All Quarterfinal matches simulated!");
}

/* -------- NEXT -------- */

function goNext(){
const saved=JSON.parse(localStorage.getItem("quarterfinal_winners"))||[];

if(saved.filter(Boolean).length !== 4){
alert("Complete all 4 matches first!");
return;
}

window.location.href="semifinals.html";
}

</script>

</body>
</html>
